<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VNP — Lái xe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --vp:#1D9E75; --vp2:#0F6E56; --hn:#185FA5;
    --amber:#BA7517; --red:#A32D2D;
    --bg:#F7F6F2; --bg2:#FFFFFF; --bg3:#EEECEA;
    --border:rgba(0,0,0,.09); --border2:rgba(0,0,0,.16);
    --text:#1a1a18; --text2:#6b6a65; --text3:#9c9b96;
    --r:8px; --rl:14px;
  }
  
  }
  body { font-family:'Poppins',-apple-system,sans-serif; background: var(--bg); color: var(--text); font-size: 14px; max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 20px; }

  /* HEADER */
  .header { background: linear-gradient(135deg, var(--vp2) 0%, var(--vp) 100%); padding: 20px 16px 24px; color: #fff; position: relative; overflow: hidden; }
  .header::after { content:''; position:absolute; right:-30px; top:-30px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,.08); pointer-events:none; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header-name { font-size: 18px; font-weight: 600; }
  .header-date { font-size: 12px; opacity: .8; margin-top: 2px; }
  .back-btn { background: rgba(255,255,255,.2); border: none; color: #fff; padding: 6px 12px; border-radius: var(--r); font-size: 12px; cursor: pointer; text-decoration: none; display: inline-block; }
  .stats { display: flex; gap: 10px; }
  .stat { background: rgba(255,255,255,.18); border-radius: var(--r); padding: 8px 14px; flex: 1; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 600; }
  .stat-lbl { font-size: 11px; opacity: .8; margin-top: 2px; }

  /* CONTENT */
  .content { padding: 16px; }

  /* TRIP CARD */
  .trip { background: var(--bg2); border-radius: var(--rl); border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden; }
  .trip-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .trip-time { font-size: 15px; font-weight: 600; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 9px; font-weight: 600; }
  .b0 { background: #E1F5EE; color: #0F6E56; }
  .b1 { background: #E6F1FB; color: #185FA5; }
  .b2 { background: #FAEEDA; color: #BA7517; }
  .b3 { background: #EAF3DE; color: #3B6D11; }
  .b4 { background: #FCEBEB; color: #A32D2D; }

  .trip-body { padding: 14px 16px; }

  /* CUSTOMER ROW */
  .cust-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cust-left { display: flex; align-items: center; gap: 12px; }
  .call-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--vp); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, transform .1s; box-shadow: 0 2px 8px rgba(29,158,117,.3); }
  .call-btn:active { transform: scale(.9); background: var(--vp2); }
  .call-btn svg { width: 18px; height: 18px; fill: #fff; }
  .cust-phone { font-size: 15px; font-weight: 600; }
  .cust-name { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .cust-price { font-size: 14px; font-weight: 600; color: var(--vp); }

  /* ROUTE */
  .route-box { background: var(--bg3); border-radius: var(--r); padding: 11px 13px; margin-bottom: 14px; }
  .route-row { display: flex; align-items: flex-start; gap: 9px; padding: 3px 0; font-size: 13px; }
  .rdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .rline { width: 1px; height: 13px; background: var(--border2); margin: 1px 0 1px 4px; }

  /* WORKFLOW */
  .wf { display: flex; gap: 4px; margin-bottom: 14px; }
  .wf-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: default; }
  .wf-circle { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; border: 1.5px solid var(--border2); background: var(--bg3); color: var(--text3); transition: all .2s; }
  .wf-lbl { font-size: 9px; color: var(--text3); text-align: center; line-height: 1.3; }
  .wf-step.done .wf-circle { background: var(--vp); border-color: var(--vp); color: #fff; }
  .wf-step.active .wf-circle { background: var(--bg2); border-color: var(--vp); color: var(--vp); box-shadow: 0 0 0 3px rgba(29,158,117,.15); }
  .wf-step.done .wf-lbl, .wf-step.active .wf-lbl { color: var(--vp); font-weight: 600; }

  /* ACTION BUTTONS */
  .actions { display: flex; gap: 8px; }
  .btn-next { flex: 1; padding: 11px; background: var(--vp); color: #fff; border: none; border-radius: var(--r); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
  .btn-next:hover { background: var(--vp2); }
  .btn-next:disabled { background: var(--bg3); color: var(--text3); cursor: default; }
  .btn-noreply { padding: 11px 14px; background: none; border: 1px solid #E24B4A; color: var(--red); border-radius: var(--r); font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-chat { padding: 11px 13px; background: none; border: 1px solid var(--border2); border-radius: var(--r); font-size: 13px; cursor: pointer; color: var(--text2); font-family: inherit; text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .btn-chat:hover { border-color: var(--hn); }

  /* FINISH CARD */
  .finish-card { background: var(--bg2); border-radius: var(--rl); border: 1px solid var(--border); padding: 24px 20px; text-align: center; margin-top: 16px; display: none; }
  .finish-icon { font-size: 44px; margin-bottom: 12px; }
  .finish-title { font-size: 16px; font-weight: 600; }
  .finish-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .finish-total { font-size: 32px; font-weight: 700; color: var(--vp); margin: 14px 0 4px; }
  .finish-label { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
  .qr-box { width: 130px; height: 130px; margin: 0 auto 16px; background: var(--bg3); border-radius: var(--r); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
  .qr-box span { font-size: 11px; color: var(--text2); }
  .btn-confirm-pay { width: 100%; padding: 12px; background: var(--vp); color: #fff; border: none; border-radius: var(--r); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a18; color: #fff; padding: 11px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* EMPTY */
  .empty { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-name">🚗 Anh Hùng</div>
      <div class="header-date" id="hdr-date"></div>
    </div>
    <a href="admin.html" class="back-btn">← Admin</a>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Tổng khách</div></div>
    <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">Đã trả</div></div>
    <div class="stat"><div class="stat-val" id="s-rev">0đ</div><div class="stat-lbl">Thu tạm</div></div>
  </div>
</div>

<div class="content">
  <div id="trip-list"></div>
  <div id="finish-card" class="finish-card">
    <div class="finish-icon">🎉</div>
    <div class="finish-title">Hoàn tất tất cả chuyến!</div>
    <div class="finish-sub" id="finish-sub"></div>
    <div class="finish-total" id="finish-total"></div>
    <div class="finish-label">Quét QR chuyển khoản về công ty</div>
    <div class="qr-box" onclick="showQRDetail()">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
        <rect x="5" y="5" width="20" height="20" rx="3" stroke="currentColor" stroke-width="2" fill="none"/>
        <rect x="9" y="9" width="12" height="12" rx="1" fill="currentColor" opacity=".4"/>
        <rect x="35" y="5" width="20" height="20" rx="3" stroke="currentColor" stroke-width="2" fill="none"/>
        <rect x="39" y="9" width="12" height="12" rx="1" fill="currentColor" opacity=".4"/>
        <rect x="5" y="35" width="20" height="20" rx="3" stroke="currentColor" stroke-width="2" fill="none"/>
        <rect x="9" y="39" width="12" height="12" rx="1" fill="currentColor" opacity=".4"/>
        <rect x="35" y="35" width="6" height="6" fill="currentColor" opacity=".4"/>
        <rect x="43" y="35" width="6" height="6" fill="currentColor" opacity=".4"/>
        <rect x="51" y="35" width="4" height="6" fill="currentColor" opacity=".4"/>
        <rect x="35" y="43" width="6" height="6" fill="currentColor" opacity=".4"/>
        <rect x="43" y="51" width="12" height="4" fill="currentColor" opacity=".4"/>
      </svg>
      <span>Nhấn để xem mã QR</span>
    </div>
    <button class="btn-confirm-pay" onclick="confirmPayment()">✓ Đã chuyển khoản xong</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WF_LABELS = ['Nhận TT','Đã hẹn','Đã đón','Đã trả','K.liên lạc'];
const WF_BADGES = ['Nhận thông tin','Đã hẹn','Đã đón','Đã trả','Không liên lạc'];
const BADGE_CLS = ['b0','b1','b2','b3','b4'];

// Dữ liệu mẫu lái xe (load từ localStorage nếu có)
let trips = [
  {id:1,time:'06:30',phone:'0912 345 678',name:'Anh Tuấn',pickup:'Phúc Yên, Vĩnh Phúc',dropoff:'Mỹ Đình, Hà Nội',price:80000,step:0},
  {id:2,time:'07:00',phone:'0987 654 321',name:'Chị Mai',pickup:'Vĩnh Yên, VP',dropoff:'Cầu Giấy, HN',price:85000,step:0},
  {id:3,time:'07:30',phone:'0901 111 222',name:'Anh Bình',pickup:'Tam Đảo, VP',dropoff:'Đống Đa, HN',price:90000,step:0},
  {id:4,time:'08:00',phone:'0978 888 999',name:'Chị Hoa',pickup:'Bình Xuyên, VP',dropoff:'Long Biên, HN',price:80000,step:0},
];

// Try load from admin's localStorage
try {
  const adminData = localStorage.getItem('vnp_customers');
  if (adminData) {
    const all = JSON.parse(adminData);
    const assigned = all.filter(c => c.driver === 'Anh Hùng' || c.status === 'assigned');
    if (assigned.length) {
      trips = assigned.map(c => ({
        id: c.id, time: c.time, phone: c.phone, name: c.phone,
        pickup: c.pickup, dropoff: c.dropoff, price: c.price, step: 0
      }));
    }
  }
} catch(e){}

function saveTrips() { localStorage.setItem('vnp_trips', JSON.stringify(trips)); }

// CLOCK / DATE
document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('vi-VN',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});

// STATS
function updateStats() {
  const done = trips.filter(t => t.step === 3);
  const rev = done.reduce((s,t) => s+t.price, 0);
  document.getElementById('s-total').textContent = trips.length;
  document.getElementById('s-done').textContent = done.length;
  document.getElementById('s-rev').textContent = rev >= 1000000 ? (rev/1000000).toFixed(1)+'tr' : rev.toLocaleString('vi-VN')+'đ';
}

// RENDER TRIPS
function render() {
  updateStats();
  const allDone = trips.every(t => t.step === 3);
  document.getElementById('finish-card').style.display = allDone ? 'block' : 'none';

  if (allDone) {
    const total = trips.reduce((s,t)=>s+t.price,0);
    document.getElementById('finish-sub').textContent = trips.length + ' khách · ' + new Date().toLocaleDateString('vi-VN');
    document.getElementById('finish-total').textContent = total.toLocaleString('vi-VN') + 'đ';
  }

  document.getElementById('trip-list').innerHTML = trips.map(t => {
    const s = t.step;
    const next_labels = ['Xác nhận nhận thông tin','✓ Đã hẹn khách','✓ Đã đón khách','✓ Đã trả khách'];
    return `
    <div class="trip" id="trip-${t.id}">
      <div class="trip-top">
        <span class="trip-time">${t.time}</span>
        <span class="badge ${BADGE_CLS[s]}">${WF_BADGES[s]}</span>
      </div>
      <div class="trip-body">
        <div class="cust-row">
          <div class="cust-left">
            <button class="call-btn" onclick="callCustomer(${t.id})" title="Gọi ngay">
              <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1 .23l-2.2 2.2a15.045 15.045 0 01-6.52-6.49l2.2-2.21a.977.977 0 00.23-1c-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
            </button>
            <div>
              <div class="cust-phone">${t.phone}</div>
              <div class="cust-name">${t.name}</div>
            </div>
          </div>
          <span class="cust-price">${t.price.toLocaleString('vi-VN')}đ</span>
        </div>
        <div class="route-box">
          <div class="route-row"><div class="rdot" style="background:var(--vp)"></div><span>${t.pickup}</span></div>
          <div class="rline"></div>
          <div class="route-row"><div class="rdot" style="background:var(--hn)"></div><span>${t.dropoff}</span></div>
        </div>
        <div class="wf">
          ${WF_LABELS.map((lbl,i) => `
            <div class="wf-step ${i<s?'done':i===s?'active':''}">
              <div class="wf-circle">${i<s?'✓':i+1}</div>
              <div class="wf-lbl">${lbl}</div>
            </div>
          `).join('')}
        </div>
        <div class="actions">
          ${s < 3
            ? `<button class="btn-next" onclick="nextStep(${t.id})">${next_labels[s]}</button>`
            : `<button class="btn-next" disabled>✓ Đã hoàn tất</button>`}
          <a href="chat.html#trip-${t.id}" class="btn-chat">💬</a>
          ${s < 3 ? `<button class="btn-noreply" onclick="noReply(${t.id})" title="Không liên lạc được">✕</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function nextStep(id) {
  const t = trips.find(x=>x.id===id);
  if (!t || t.step >= 3) return;
  t.step++;
  saveTrips();
  render();
  const msgs = ['','📅 Đã hẹn khách xong!','🚗 Đã đón khách lên xe!','🏁 Đã trả khách thành công!'];
  if (msgs[t.step]) showToast(msgs[t.step]);
  if (trips.every(x=>x.step===3)) {
    setTimeout(() => { playAllDone(); showToast('🎉 Đã đón hết khách! Về bến nhé!'); }, 300);
  }
}

function noReply(id) {
  const t = trips.find(x=>x.id===id);
  if (!t) return;
  t.step = 4;
  saveTrips(); render();
  showToast('⚠️ Đã đánh dấu không liên lạc được');
}

function callCustomer(id) {
  const t = trips.find(x=>x.id===id);
  if (!t) return;
  if (t.step === 0) { t.step = 1; saveTrips(); render(); }
  showToast('📞 Đang gọi ' + t.phone + '...');
  // window.location.href = 'tel:' + t.phone.replace(/\s/g,'');
}

function showQRDetail() {
  const total = trips.reduce((s,t)=>s+t.price,0);
  alert('🏦 QR Chuyển khoản VietQR\n\nNgân hàng: VietcomBank\nSố TK: 1234 5678 90\nTên: CONG TY VNP TRANSPORT\nSố tiền: ' + total.toLocaleString('vi-VN') + 'đ\nNội dung: THANH TOAN CHUYEN ' + new Date().toLocaleDateString('vi-VN'));
}

function confirmPayment() {
  showToast('✅ Xác nhận hoàn thành! Cảm ơn anh Hùng!');
  document.getElementById('finish-card').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 3000);
}

function playAllDone() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1100,.22],[880,.44],[1320,.66]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.2,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.22);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.25);
    });
  } catch(e){}
}

render();
</script>
</body>
</html>
